# =============================================================================
# Bigotes y Paticas — Stack de desarrollo local
# Levanta Postgres 16 + Redis 7 + MinIO + Mailhog con healthchecks.
# NO toca Postgres/Sheets de producción.
# =============================================================================
name: bigotesypaticas

services:
  postgres:
    image: postgres:16-alpine
    container_name: bp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bp_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bp_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_min_duration_statement=200"
      - "-c"
      - "timezone=America/Bogota"

  redis:
    image: redis:7-alpine
    container_name: bp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: bp_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DEFAULT_BUCKETS: "bp-uploads,bp-backups,bp-public"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    # Crea los buckets default. Se ejecuta una vez y termina.
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: bp_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/bp-uploads || true;
      mc mb -p local/bp-backups || true;
      mc mb -p local/bp-public || true;
      mc anonymous set download local/bp-public || true;
      echo 'MinIO buckets ready.'
      "
    restart: "no"

  mailhog:
    # SMTP de mentira para emails transaccionales en desarrollo.
    image: mailhog/mailhog:v1.0.1
    container_name: bp_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI

volumes:
  pg_data:
  redis_data:
  minio_data:
